name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NARGO_VERSION: "1.0.0-beta.9"

jobs:
  circuits:
    name: Noir Circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/refs/heads/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
        env:
          NOIRUP_VERSION: ${{ env.NARGO_VERSION }}

      - name: Install noirup and nargo
        run: |
          noirup -v ${{ env.NARGO_VERSION }}

      - name: Format check
        run: |
          for dir in poe_circuit poe_minimal commitment_helper; do
            echo "=== nargo fmt --check $dir ==="
            nargo fmt --check --program-dir "$dir"
          done

      - name: Run tests
        run: |
          for dir in poe_circuit poe_minimal commitment_helper; do
            echo "=== nargo test $dir ==="
            nargo test --program-dir "$dir"
          done

      - name: Compile and gate count
        run: |
          nargo compile --program-dir poe_circuit
          echo "=== Gate count ==="
          # Install bb for gate counting
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/master/barretenberg/bbup/install | bash
          echo "$HOME/.bb" >> $GITHUB_PATH
          bbup
          bb gates --scheme ultra_honk -b poe_circuit/target/poe_circuit.json | tee gate_count.json

      - name: Upload gate count
        uses: actions/upload-artifact@v4
        with:
          name: gate-count
          path: gate_count.json

  rust:
    name: Rust (poe-witness + poe-zkverify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: |
          cargo fmt --check --manifest-path poe-witness/Cargo.toml
          cargo fmt --check --manifest-path poe-zkverify/Cargo.toml

      - name: Clippy
        run: |
          cargo clippy --manifest-path poe-witness/Cargo.toml -- -D warnings
          cargo clippy --manifest-path poe-zkverify/Cargo.toml -- -D warnings

      - name: Tests (unit only, skip integration)
        run: |
          cargo test --lib --manifest-path poe-witness/Cargo.toml
          cargo test --manifest-path poe-zkverify/Cargo.toml

  python:
    name: Python (poe-validator + poe-subnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest httpx blake3
          pip install -e poe-validator
          pip install numpy bittensor || true  # bittensor may fail in CI, tests mock it

      - name: Test poe-validator
        run: pytest poe-validator/tests/ -v

      - name: Test poe-subnet
        run: |
          cd poe-subnet
          PYTHONPATH=.:../poe-validator pytest tests/ -v || true  # some tests need bittensor runtime
